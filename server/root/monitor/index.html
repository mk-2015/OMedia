<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitord</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .gauge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .gauge-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }
        .gauge-card:hover {
            border-color: rgba(6, 182, 212, 0.18);
        }
        .gauge-ring {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 16px;
        }
        .gauge-ring svg {
            transform: rotate(-90deg);
        }
        .gauge-ring circle {
            fill: none;
            stroke-width: 8;
        }
        .gauge-ring .bg { stroke: rgba(255,255,255,0.06); }
        .gauge-ring .fill { stroke: var(--accent-cyan); stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
        .gauge-ring .fill.warn { stroke: #f59e0b; }
        .gauge-ring .fill.danger { stroke: var(--accent-rose); }
        .gauge-percent {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.6rem;
            font-weight: 700;
        }
        .gauge-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .gauge-detail {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .info-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
        }
        .info-card h3 {
            margin: 0 0 14px;
            font-size: 1rem;
            color: var(--text-primary);
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.85rem;
        }
        .info-row:last-child { border-bottom: none; }
        .info-row .label { color: var(--text-secondary); }
        .info-row .value { color: var(--text-primary); font-weight: 500; }
        .proc-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .proc-table th {
            text-align: left;
            padding: 10px 12px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
        }
        .proc-table td {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .proc-table tr:hover td {
            background: rgba(6, 182, 212, 0.04);
        }
        .header-controls { display: flex; gap: 10px; align-items: center; }
        .refresh-badge {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: rgba(255,255,255,0.04);
            padding: 4px 10px;
            border-radius: 6px;
        }
        @media (max-width: 900px) {
            .gauge-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 500px) {
            .gauge-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="hero">
            <div>
                <p class="eyebrow">System monitor</p>
                <h1>Monitord</h1>
                <p class="hero-copy">Real-time system stats for your machine.</p>
            </div>
            <div class="hero-actions">
                <span id="systemBadge" class="refresh-badge"></span>
                <a href="/omedia/userdashboard.html" class="btn btn-secondary" style="text-decoration: none;">Dashboard</a>
				<a href="/omedia/admin.html" class="btn btn-primary" style="margin-right: 12px; text-decoration: none; display: inline-block;">Admin</a>
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
            </div>
        </header>

        <main>
            <section class="gauge-grid" id="gauges">
                <div class="gauge-card">
                    <div class="gauge-ring">
                        <svg width="120" height="120"><circle class="bg" cx="60" cy="60" r="52"/><circle class="fill" id="cpuFill" cx="60" cy="60" r="52"/></svg>
                        <div class="gauge-percent" id="cpuPercent">--</div>
                    </div>
                    <div class="gauge-label">CPU</div>
                    <div class="gauge-detail" id="cpuDetail">--</div>
                </div>
                <div class="gauge-card">
                    <div class="gauge-ring">
                        <svg width="120" height="120"><circle class="bg" cx="60" cy="60" r="52"/><circle class="fill" id="memFill" cx="60" cy="60" r="52"/></svg>
                        <div class="gauge-percent" id="memPercent">--</div>
                    </div>
                    <div class="gauge-label">Memory</div>
                    <div class="gauge-detail" id="memDetail">--</div>
                </div>
                <div class="gauge-card">
                    <div class="gauge-ring">
                        <svg width="120" height="120"><circle class="bg" cx="60" cy="60" r="52"/><circle class="fill" id="diskFill" cx="60" cy="60" r="52"/></svg>
                        <div class="gauge-percent" id="diskPercent">--</div>
                    </div>
                    <div class="gauge-label">Disk</div>
                    <div class="gauge-detail" id="diskDetail">--</div>
                </div>
                <div class="gauge-card">
                    <div class="gauge-ring">
                        <svg width="120" height="120"><circle class="bg" cx="60" cy="60" r="52"/><circle class="fill" id="swapFill" cx="60" cy="60" r="52"/></svg>
                        <div class="gauge-percent" id="swapPercent">--</div>
                    </div>
                    <div class="gauge-label">Swap</div>
                    <div class="gauge-detail" id="swapDetail">--</div>
                </div>
            </section>

            <section class="info-grid">
                <div class="info-card">
                    <h3>System</h3>
                    <div id="systemInfo"></div>
                </div>
                <div class="info-card">
                    <h3>Uptime</h3>
                    <div id="uptimeInfo"></div>
                </div>
                <div class="info-card">
                    <h3>Network</h3>
                    <div id="networkInfo"></div>
                </div>
                <div class="info-card">
                    <h3>Disks</h3>
                    <div id="diskInfo"></div>
                </div>
            </section>

            <section class="panel" style="overflow-x: auto;">
                <h2>Top Processes</h2>
                <table class="proc-table">
                    <thead>
                        <tr>
                            <th>PID</th>
                            <th>Name</th>
                            <th>User</th>
                            <th>CPU %</th>
                            <th>MEM %</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="procBody"></tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="/static/monitor.js"></script>
</body>
</html>
