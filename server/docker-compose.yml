version: '3.8'

services:
  web-server:
    build: .
    container_name: python_server
    ports:
      - "443:443"
    volumes:
      # Persistent storage mounts
      - ./data:/app/data
      - ./logs:/app/logs
      # Optional: Mount config if you want to change settings without rebuilding
      - ./config.json:/app/config.json
    restart: unless-stopped
